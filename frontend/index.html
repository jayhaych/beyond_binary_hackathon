<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice File Reader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Voice File Reader</h1>
        <p class="description">Speak the filename to read and hear it (e.g. "hello.txt" or "document.pdf")</p>
        
        <div class="voice-section">
            <button id="startBtn" class="voice-btn">
                <span class="mic-icon">🎤</span>
                Start Voice Input
            </button>
            <button id="stopBtn" class="voice-btn" disabled>
                Stop Recording
            </button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="transcript" class="transcript"></div>
        
        <div id="fileContent" class="file-content"></div>
        
        <div id="error" class="error"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
